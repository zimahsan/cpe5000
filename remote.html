<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            gap: 20px;
        }

        button {
            font-size: 30px;
            padding: 20px 40px;
            border: none;
            border-radius: 10px;

        .next {
            background: green;
            color: white;
        }

        .prev {
            background: red;
            color: white;

    <h2>Slide Remote</h2>

    <button class="prev" onclick="send('prev')">◀ Prev</button>
    <button class="next" onclick="send('next')">Next ▶</button>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHbM5DMVwy8D3QtYawHBEOex64",
            authDomain: "slide-remote-129b8.firebaseapp.com",
            databaseURL: "https://slide-remote-129b8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "slide-remote-129b8",
            storageBucket: "slide-remote-129b8.firebasestorage.app",
            messagingSenderId: "789464647586",
            appId: "1:789464647586:web:dce9d5b14c35fa225a54fb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function send(cmd) {
            db.ref("slides").push({
                action: cmd,
                time: Date.now()
            });
        }
    </script>

<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-family: Arial;
            background: #111;
            color: white;
            align-items: center;
        }

        button {
            width: 80%;
            padding: 25px;
            font-size: 22px;
            margin: 10px;
            border: none;
            border-radius: 15px;
            background: #1F8A80;
            color: white;
            font-weight: bold;
        }

        button:active {
            transform: scale(0.95);
        }

        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <h2>📱 Presentation Remote</h2>

    <button onclick="send('prev')">⬅️ Prev</button>
    <button onclick="send('next')">➡️ Next</button>

    <script>
        function send(action) {
            localStorage.setItem("slide_remote_action", JSON.stringify({
                action,
                time: Date.now()
            }));

            if (navigator.vibrate) navigator.vibrate(50);
        }
    </script>

</body>

</html>
