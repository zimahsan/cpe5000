<!DOCTYPE html>
<html>

<head>
    <title>Presentation Remote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        button {
            width: 100%;
            height: 150px;
            font-size: 40px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <button onclick="sendCommand('prev')">⬅ Previous</button>
    <button onclick="sendCommand('next')">Next ➡</button>

    <script type="module">

        window.sendCommand = function (cmd) {
            set(ref(db, 'presentation/control'), {
                command: cmd,
                timestamp: Date.now()
            });
        }
    </script>

</body>

</html>
