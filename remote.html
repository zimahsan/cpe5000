<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Control</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            gap: 20px;
        }

        button {
            font-size: 30px;
            padding: 20px 40px;
            border: none;
            border-radius: 10px;
        }

        .next {
            background: green;
            color: white;
        }

        .prev {
            background: red;
            color: white;
        }
    </style>
</head>

<body>

    <h2>Slide Remote</h2>

    <button class="prev" onclick="send('prev')">◀ Prev</button>
    <button class="next" onclick="send('next')">Next ▶</button>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>



    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHbM5DMVwy8D3QtYawHBEOex64",
            authDomain: "slide-remote-129b8.firebaseapp.com",
            databaseURL: "https://slide-remote-129b8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "slide-remote-129b8",
            storageBucket: "slide-remote-129b8.firebasestorage.app",
            messagingSenderId: "789464647586",
            appId: "1:789464647586:web:dce9d5b14c35fa225a54fb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function send(cmd) {
            db.ref("slides").push({
                action: cmd,
                time: Date.now()
            });
        }
    </script>

</body>

</html>
