<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Remote</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: Arial;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
            background: #f5f5f5;
        }

        button {
            font-size: 32px;
            padding: 20px 40px;
            border-radius: 20px;
            border: none;
            background: #1F8A80;
            color: white;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>

    <h2>📱 Presentation Remote</h2>

    <button onclick="prev()">⬅ Prev</button>
    <button onclick="next()">Next ➡</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHbM5DMVwyoZQWczJ8D3QtYawHBEOex64",
            authDomain: "slide-remote-129b8.firebaseapp.com",
            databaseURL: "https://slide-remote-129b8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "slide-remote-129b8",
            storageBucket: "slide-remote-129b8.firebasestorage.app",
            messagingSenderId: "789464647586",
            appId: "1:789464647586:web:dce9d5b14c35fa225a54fb",
            measurementId: "G-Q0PTYBDRX7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const slideRef = db.ref("presentation/currentSlide");

        let current = 0;

        /* track current slide */
        slideRef.on("value", (snap) => {
            current = snap.val() || 0;
        });

        function next() {
            slideRef.set(current + 1);
            vibrate();
        }

        function prev() {
            slideRef.set(Math.max(0, current - 1));
            vibrate();
        }

        /* vibration feedback */
        function vibrate() {
            if (navigator.vibrate) navigator.vibrate(50);
        }
    </script>

</body>

</html>
