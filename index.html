<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mental Care Practice Analysis</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/theme/dracula.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <div class="reveal">
        <div class="slides">

            <section data-markdown>
                <textarea data-template>
## 🚀 Professional Counseling Analysis
### Private Mental Health Practice Evaluation

**Setting:** Mental Care Clinic  
**Presenter:** Encik Syafiq  
            </textarea>
            </section>

            <section>
                <h2>Slide 2 Example</h2>
                <p>This is working Reveal.js + Firebase control</p>
            </section>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/plugin/markdown/markdown.min.js"></script>

    <script>
        Reveal.initialize({
            hash: true,
            slideNumber: true,
            transition: 'slide',
            plugins: [RevealMarkdown],
            controls: true,
            touch: true
        });
    </script>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAHbM5DMVwy8D3QtYawHBEOex64",
            authDomain: "slide-remote-129b8.firebaseapp.com",
            databaseURL: "https://slide-remote-129b8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "slide-remote-129b8",
            storageBucket: "slide-remote-129b8.firebasestorage.app",
            messagingSenderId: "789464647586",
            appId: "1:789464647586:web:dce9d5b14c35fa225a54fb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // listen every click event
        db.ref("slides").limitToLast(1).on("child_added", (snap) => {
            const data = snap.val();

            if (data.action === "next") Reveal.next();
            if (data.action === "prev") Reveal.prev();
        });
    </script>

</body>

</html>
